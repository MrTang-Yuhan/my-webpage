<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>写作后台 | 个人知识站</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; }
      .admin-tip {
        border-bottom: 1px solid #e5e7eb;
        background: #f8fafc;
        color: #334155;
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.65;
      }
      .admin-tip p { margin: 0.25rem 0; }
      .admin-tip code {
        background: #e2e8f0;
        border-radius: 4px;
        padding: 0 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      body.cms-editor-mode .admin-tip { display: none !important; }
      #cms-editor-tools-host { display: none; }
      body.cms-editor-mode #cms-editor-tools-host:not(:empty) {
        display: block;
        position: sticky;
        top: 0;
        z-index: 2147483000;
        background: #f8fafc;
        border-bottom: 1px solid #e5e7eb;
      }
      #inline-image-button-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-left: 8px;
        vertical-align: middle;
      }
      #inline-image-insert-btn {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
        color: #0f6c73;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        padding: 6px 8px;
      }
      #inline-image-insert-btn:disabled {
        cursor: wait;
        opacity: 0.65;
      }
      #inline-image-status {
        color: #475569;
        font-size: 12px;
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      body.cms-editor-mode [data-cms-editor-global-nav="hidden"] {
        display: none !important;
      }
    </style>
  </head>
  <body>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@4.0.0/dist/markdown-it-footnote.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-katex@2.0.3/dist/markdown-it-katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
    <script>
      (function () {
        if (!window.CMS) return;

        const scopedPreviewCss = `
.cms-post-preview {
  --font-ui: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-reading: 'Noto Serif SC', 'Source Han Serif SC', serif;
  --font-mono: 'JetBrains Mono', monospace;
  --bg: #f6f7f3;
  --panel: #ffffff;
  --ink: #1e2728;
  --muted: #5f6b6d;
  --line: #d8ddde;
  --brand: #0f6c73;
  --brand-soft: #e4f0f0;
  --code-bg: #f1f4f5;
  max-width: 900px;
  margin: 0 auto;
  padding: 1.2rem;
  background: radial-gradient(circle at top, var(--brand-soft), var(--bg) 35%);
  color: var(--ink);
  font-family: var(--font-ui);
  line-height: 1.75;
}
.cms-post-preview .post { padding: 0; }
.cms-post-preview .post-header { border-bottom: 1px solid var(--line); margin-bottom: 1rem; padding-bottom: 1rem; }
.cms-post-preview .post-title { margin: 0; font-size: 2rem; line-height: 1.25; }
.cms-post-preview .post-meta { margin-top: 0.5rem; color: var(--muted); display: flex; gap: 0.4rem; align-items: center; }
.cms-post-preview .post-content { max-width: 760px; margin: 0 auto; font-family: var(--font-reading); font-size: 1.08rem; line-height: 1.9; overflow-wrap: break-word; }
.cms-post-preview .post-content h2, .cms-post-preview .post-content h3, .cms-post-preview .post-content h4 { font-family: var(--font-ui); }
.cms-post-preview .post-content h2 { border-left: 3px solid var(--brand); padding-left: 0.55rem; }
.cms-post-preview .post-content ul, .cms-post-preview .post-content ol { padding-left: 1.3rem; }
.cms-post-preview .post-content table { width: 100%; border-collapse: collapse; border: 1px solid var(--line); overflow-x: auto; display: block; }
.cms-post-preview .post-content th, .cms-post-preview .post-content td { border: 1px solid var(--line); padding: 0.5rem 0.65rem; }
.cms-post-preview .post-content th { background: var(--brand-soft); }
.cms-post-preview .post-content code { font-family: var(--font-mono); background: var(--code-bg); border-radius: 4px; padding: 0.1em 0.35em; }
.cms-post-preview .post-content pre { background: var(--code-bg); border: 1px solid var(--line); border-radius: 10px; padding: 0.9rem; overflow-x: auto; }
.cms-post-preview .post-content pre code { background: transparent; padding: 0; }
.cms-post-preview .post-content img, .cms-post-preview .post-content video { max-width: 100%; height: auto; border-radius: 8px; display: block; margin: 1rem auto; }
.cms-post-preview .post-content blockquote { border-left: 4px solid var(--brand); background: var(--brand-soft); margin-left: 0; padding: 0.75rem 0.9rem; }
.cms-post-preview .post-content aside.footnote { border: 1px solid var(--line); border-left: 3px solid var(--brand); background: var(--panel); border-radius: 8px; margin: 0.5rem 0 1rem; padding: 0.55rem 0.7rem; color: var(--muted); }
.cms-post-preview .post-tags { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-top: 1rem; }
.cms-post-preview .tag { background: var(--brand-soft); color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 0.2rem 0.6rem; font-size: 0.8rem; }
`;

        const md = window.markdownit({ html: true, breaks: false, linkify: true });
        if (window.markdownitFootnote) md.use(window.markdownitFootnote);
        if (window.markdownitKatex) md.use(window.markdownitKatex);

        function normalizeBlockMath(markdownText) {
          return String(markdownText || "").replace(
            /(^|\n)\$\$\s*\n([\s\S]*?)\n\$\$(?=\n|$)/g,
            function (_, prefix, expr) {
              return prefix + "$$" + expr.trim() + "$$";
            }
          );
        }

        function normalizeFootnotes(html) {
          return html
            .replace(/<hr class="footnotes-sep">\s*/g, '')
            .replace(/<section class="footnotes">([\s\S]*?)<\/section>/g, function(_, section) {
              const items = [];
              const liPattern = /<li id="fn(\d+)" class="footnote-item">([\s\S]*?)<\/li>/g;
              let match;
              while ((match = liPattern.exec(section)) !== null) {
                const id = match[1];
                const body = match[2].replace(/<a href="#fnref\d+" class="footnote-backref">[\s\S]*?<\/a>/g, '').trim();
                items.push('<aside id="fn' + id + '" class="footnote">' + body + '</aside>');
              }
              return items.join('\n');
            });
        }

        function moveFootnotesNearRefs(root) {
          const byId = {};
          root.querySelectorAll('aside.footnote[id]').forEach(function(aside) {
            byId[aside.id] = aside;
          });
          const moved = new Set();
          root.querySelectorAll('sup.footnote-ref a[href^="#fn"]').forEach(function(link) {
            const id = (link.getAttribute('href') || '').replace('#', '');
            const aside = byId[id];
            if (!aside || moved.has(id)) return;
            const anchor = link.closest('p, li, blockquote, h1, h2, h3, h4, h5, h6');
            if (!anchor || !anchor.parentNode) return;
            anchor.parentNode.insertBefore(aside, anchor.nextSibling);
            moved.add(id);
          });
        }

        function getPreviewPostBaseDir(entry) {
          const pathValue = entry && typeof entry.get === 'function' ? entry.get('path') : '';
          const path = String(pathValue || '').replace(/\\/g, '/');
          if (path && /^src\/posts\/.+\/[^/]+\/index\.md$/.test(path)) {
            return path.replace(/^src/, '').replace(/\/index\.md$/, '/');
          }

          const archive = String(entry.getIn(['data', 'archive']) || '').trim();
          const explicitSlug = String(entry.get('slug') || '').trim();
          const postId = String(entry.getIn(['data', 'post_id']) || '').trim();
          const title = String(entry.getIn(['data', 'title']) || '').trim();
          const fallbackSlug = (explicitSlug || postId || title || 'preview')
            .toLocaleLowerCase('zh-Hans-CN')
            .replace(/\s+/g, '-')
            .replace(/[\\/]+/g, '-')
            .replace(/[^\w\u4e00-\u9fff-]+/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '') || 'preview';
          if (!archive) return '';
          return '/posts/' + archive + '/' + fallbackSlug + '/';
        }

        function fixPreviewImagePaths(root, entry) {
          if (!root) return;
          const baseDir = getPreviewPostBaseDir(entry);
          root.querySelectorAll('img[src]').forEach(function (img) {
            const src = String(img.getAttribute('src') || '').trim();
            if (!src) return;
            if (/^(?:[a-z]+:|\/|#|data:|blob:)/i.test(src)) return;
            if (src.indexOf('./img/') === 0) {
              if (baseDir) img.setAttribute('src', baseDir + src.slice(2));
              return;
            }
            if (baseDir) {
              img.setAttribute('src', new URL(src, window.location.origin + baseDir).pathname);
            }
          });
        }

        function renderPreviewHtml(entry) {
          const body = normalizeBlockMath(entry.getIn(['data', 'body']) || '');
          const title = entry.getIn(['data', 'title']) || '';
          const date = entry.getIn(['data', 'date']) || '';
          const description = entry.getIn(['data', 'description']) || '';
          const tags = entry.getIn(['data', 'tags']) || [];
          const tagsArray = tags && typeof tags.toJS === 'function' ? tags.toJS() : (Array.isArray(tags) ? tags : []);

          let bodyHtml = md.render(body);
          bodyHtml = normalizeFootnotes(bodyHtml);

          const tagsHtml = tagsArray
            .filter(Boolean)
            .map(function(tag) { return '<span class="tag">' + String(tag) + '</span>'; })
            .join('');

          return '' +
            '<article class="post">' +
              '<header class="post-header">' +
                '<h1 class="post-title">' + String(title) + '</h1>' +
                '<div class="post-meta">' +
                  (date ? '<span>' + String(date).slice(0, 10) + '</span><span class="post-divider">·</span>' : '') +
                  '<span>Preview</span>' +
                '</div>' +
                (description ? '<p>' + String(description) + '</p>' : '') +
              '</header>' +
              '<div class="post-content">' + bodyHtml + '</div>' +
              '<footer class="post-footer"><div class="post-tags">' + tagsHtml + '</div></footer>' +
            '</article>';
        }

        const PostPreview = window.createClass({
          componentDidMount: function () {
            this.postProcess();
          },
          componentDidUpdate: function () {
            this.postProcess();
          },
          postProcess: function () {
            if (!this._root) return;
            moveFootnotesNearRefs(this._root);
            fixPreviewImagePaths(this._root, this.props.entry);
            if (typeof renderMathInElement === 'function') {
              renderMathInElement(this._root, {
                delimiters: [
                  { left: '$$', right: '$$', display: true },
                  { left: '$', right: '$', display: false }
                ],
                throwOnError: false
              });
            }
          },
          render: function () {
            const html = renderPreviewHtml(this.props.entry);
            return window.h('div', {
              className: 'cms-post-preview',
              ref: (el) => { this._root = el; },
              dangerouslySetInnerHTML: { __html: html }
            });
          }
        });

        const ARCHIVE_HISTORY_KEY = 'admin_archive_history_v2';
        const LEGACY_ARCHIVE_HISTORY_KEY = 'admin_archive_history_v1';
        const ARCHIVE_DATALIST_ID = 'archive-combobox-options';
        const ARCHIVE_NAME_PATTERN = /^[\p{L}\p{N}_-]+$/u;

        function normalizeArchiveName(value) {
          let name = String(value || '').trim();
          name = name.replace(/^['"`]+|['"`]+$/g, '');
          return name;
        }

        function isValidArchiveName(value) {
          const name = normalizeArchiveName(value);
          if (!name) return false;
          if (name.length > 80) return false;
          if (name.includes('/') || name.includes('\\')) return false;
          if (/\.md$/i.test(name)) return false;
          if (/^index\.md$/i.test(name)) return false;
          if (/^\[object object\]$/i.test(name)) return false;
          if (/^(null|undefined|nan|true|false)$/i.test(name)) return false;
          if (/[<>{}\[\]()]/.test(name)) return false;
          if (/[\u0000-\u001f]/.test(name)) return false;
          return ARCHIVE_NAME_PATTERN.test(name);
        }

        function dedupeSortArchives(items) {
          const seen = new Set();
          const result = [];
          (items || []).forEach(function (item) {
            const name = normalizeArchiveName(item);
            if (!isValidArchiveName(name) || seen.has(name)) return;
            seen.add(name);
            result.push(name);
          });
          return result.sort(function (a, b) {
            return a.localeCompare(b, 'zh-Hans-CN');
          });
        }

        function readArchiveHistory() {
          try {
            const raw = localStorage.getItem(ARCHIVE_HISTORY_KEY);
            const arr = raw ? JSON.parse(raw) : [];
            return Array.isArray(arr) ? dedupeSortArchives(arr) : [];
          } catch (_) {
            return [];
          }
        }

        function rememberArchiveHistory(value) {
          const name = normalizeArchiveName(value);
          if (!isValidArchiveName(name)) return;
          const merged = dedupeSortArchives(readArchiveHistory().concat([name]));
          localStorage.setItem(ARCHIVE_HISTORY_KEY, JSON.stringify(merged));
        }

        function clearLegacyArchiveHistory() {
          try {
            localStorage.removeItem(LEGACY_ARCHIVE_HISTORY_KEY);
          } catch (_) {}
        }

        function sanitizeArchiveInput(value) {
          const normalized = normalizeArchiveName(value);
          return isValidArchiveName(normalized) ? normalized : '';
        }

        async function fetchArchiveDirs() {
          try {
            const res = await fetch('/admin-archives.json?ts=' + Date.now(), { cache: 'no-store' });
            if (!res.ok) return [];
            const arr = await res.json();
            return dedupeSortArchives(Array.isArray(arr) ? arr : []);
          } catch (_) {
            return [];
          }
        }

        function syncArchiveDatalist(options) {
          const existing = document.getElementById(ARCHIVE_DATALIST_ID);
          const datalist = existing || document.createElement('datalist');
          datalist.id = ARCHIVE_DATALIST_ID;
          datalist.innerHTML = '';
          (options || []).forEach(function(opt) {
            const option = document.createElement('option');
            option.value = opt;
            datalist.appendChild(option);
          });
          if (!existing) document.body.appendChild(datalist);
        }

        function ensureEditorToolsHost() {
          let host = document.getElementById('cms-editor-tools-host');
          if (host) return host;
          host = document.createElement('div');
          host.id = 'cms-editor-tools-host';
          host.setAttribute('aria-label', '文章编辑工具');
          const anchor = document.querySelector('.admin-tip');
          if (anchor && anchor.parentNode) {
            anchor.parentNode.insertBefore(host, anchor.nextSibling);
          } else {
            document.body.insertBefore(host, document.body.firstChild);
          }
          return host;
        }

        const ArchiveComboboxControl = window.createClass({
          getInitialState: function () {
            return {
              currentValue: sanitizeArchiveInput(this.props.value || '') || String(this.props.value || ''),
              options: this.getStaticOptions()
            };
          },
          componentDidMount: function () {
            clearLegacyArchiveHistory();
            this.refreshOptions();
          },
          componentDidUpdate: function (prevProps) {
            const prev = prevProps.value || '';
            const next = this.props.value || '';
            if (prev !== next && next !== this.state.currentValue) {
              this.setState({ currentValue: sanitizeArchiveInput(next) || String(next || '') });
            }
          },
          getStaticOptions: function () {
            const field = this.props.field;
            if (!field || typeof field.get !== 'function') return [];
            const raw = field.get('options');
            if (!raw) return [];
            if (typeof raw.toJS === 'function') {
              const arr = raw.toJS();
              return Array.isArray(arr) ? arr.map(function (item) { return String(item); }) : [];
            }
            return Array.isArray(raw) ? raw.map(function (item) { return String(item); }) : [];
          },
          refreshOptions: async function () {
            const staticOptions = this.getStaticOptions();
            const historyOptions = readArchiveHistory();
            const dynamicOptions = await fetchArchiveDirs();
            const options = dedupeSortArchives([].concat(staticOptions, dynamicOptions, historyOptions));
            syncArchiveDatalist(options);
            this.setState({ options: options });
          },
          onInputChange: function (e) {
            const rawValue = String(e.target.value || '');
            const sanitized = sanitizeArchiveInput(rawValue);
            this.setState({ currentValue: rawValue });
            if (sanitized) {
              rememberArchiveHistory(sanitized);
            }
            this.props.onChange(sanitized);
          },
          render: function () {
            return window.h('div', { style: { display: 'grid', gap: '8px' } }, [
              window.h('input', {
                key: 'archive-input',
                type: 'text',
                list: ARCHIVE_DATALIST_ID,
                value: this.state.currentValue,
                onChange: this.onInputChange,
                placeholder: '选择已有目录或输入新目录',
                style: {
                  width: '100%',
                  boxSizing: 'border-box',
                  padding: '10px 12px',
                  border: '1px solid #cbd5e1',
                  borderRadius: '6px'
                }
              })
            ]);
          }
        });

        function getRouteEntryPath() {
          const hash = String(window.location.hash || '');
          const marker = '#/collections/posts/entries/';
          if (hash.indexOf(marker) !== 0) return '';
          const encoded = hash.slice(marker.length).split('?')[0];
          if (!encoded) return '';
          try {
            return decodeURIComponent(encoded);
          } catch (_) {
            return encoded;
          }
        }

        function getPathParts(path) {
          const normalized = String(path || '').replace(/\\/g, '/').replace(/^\/+/, '');
          const match = normalized.match(/^src\/posts\/([^/]+)\/([^/]+)\/index\.md$/);
          if (!match) return null;
          return { archive: match[1], slug: match[2], path: normalized };
        }

        function parseRepoAndBranch() {
          const defaults = { repo: 'MrTang-Yuhan/my-webpage', branch: 'main' };
          return fetch('/admin/config.yml', { cache: 'no-store' })
            .then(function(res) { return res.ok ? res.text() : ''; })
            .then(function(text) {
              const repo = (text.match(/^\s*repo:\s*([^\s#]+)\s*$/m) || [])[1] || defaults.repo;
              const branch = (text.match(/^\s*branch:\s*([^\s#]+)\s*$/m) || [])[1] || defaults.branch;
              return { repo: repo, branch: branch };
            })
            .catch(function() { return defaults; });
        }

        async function callMovePostApi(payload) {
          const res = await fetch('/api/admin/move-post', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          let data = null;
          try {
            data = await res.json();
          } catch (_) {
            data = null;
          }
          if (!res.ok) {
            const msg = data && data.error ? data.error : ('HTTP ' + res.status);
            throw new Error(msg);
          }
          return data || {};
        }

        function ensureMovePanel() {
          let panel = document.getElementById('archive-move-panel');
          if (panel) return panel;
          panel = document.createElement('section');
          panel.id = 'archive-move-panel';
          panel.style.margin = '10px 14px';
          panel.style.padding = '12px';
          panel.style.border = '1px solid #cbd5e1';
          panel.style.borderRadius = '8px';
          panel.style.background = '#ffffff';
          panel.style.fontSize = '14px';
          panel.innerHTML =
            '<div style="font-weight:600;margin-bottom:8px;">移动文章归档</div>' +
            '<div id="archive-move-current" style="color:#475569;margin-bottom:8px;"></div>' +
            '<div style="display:grid;gap:8px;">' +
              '<input id="archive-move-target" type="text" list="' + ARCHIVE_DATALIST_ID + '" placeholder="目标 archive 目录名" style="padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;" />' +
              '<button id="archive-move-btn" type="button" style="padding:8px 10px;border:0;border-radius:6px;background:#0f6c73;color:#fff;cursor:pointer;">移动到新归档目录</button>' +
              '<div id="archive-move-status" style="color:#475569;"></div>' +
            '</div>';
          ensureEditorToolsHost().appendChild(panel);
          return panel;
        }

        async function syncArchiveMovePanel() {
          const entryPath = getRouteEntryPath();
          const parts = getPathParts(entryPath);
          const existing = document.getElementById('archive-move-panel');
          if (!parts) {
            if (existing) existing.style.display = 'none';
            return;
          }

          const panel = ensureMovePanel();
          panel.style.display = '';
          const currentEl = panel.querySelector('#archive-move-current');
          const targetInput = panel.querySelector('#archive-move-target');
          const statusEl = panel.querySelector('#archive-move-status');
          const moveBtn = panel.querySelector('#archive-move-btn');
          currentEl.textContent = '当前路径: ' + parts.path;
          if (!targetInput.value) targetInput.value = parts.archive;

          const options = await fetchArchiveDirs();
          syncArchiveDatalist(options);

          if (moveBtn.dataset.bound === '1') return;
          moveBtn.dataset.bound = '1';
          moveBtn.addEventListener('click', async function() {
            const latestPath = getRouteEntryPath();
            const latest = getPathParts(latestPath);
            if (!latest) {
              statusEl.style.color = '#b91c1c';
              statusEl.textContent = '当前条目路径不可识别，无法移动。';
              return;
            }
            const targetArchive = sanitizeArchiveInput(targetInput.value);
            if (!targetArchive) {
              statusEl.style.color = '#b91c1c';
              statusEl.textContent = '目标 archive 非法。只允许字母、数字、下划线、连字符或中文，不可包含斜杠或 .md。';
              return;
            }
            if (targetArchive === latest.archive) {
              statusEl.style.color = '#475569';
              statusEl.textContent = '目标 archive 与当前一致，无需移动。';
              return;
            }

            moveBtn.disabled = true;
            statusEl.style.color = '#475569';
            statusEl.textContent = '正在提交移动...';
            try {
              const cfg = await parseRepoAndBranch();
              const moved = await callMovePostApi({
                repo: cfg.repo,
                branch: cfg.branch,
                oldArchive: latest.archive,
                targetArchive: targetArchive,
                slug: latest.slug
              });

              rememberArchiveHistory(targetArchive);
              statusEl.style.color = '#065f46';
              statusEl.textContent = '迁移成功，共移动 ' + moved.movedCount + ' 个文件。提交: ' + (moved.commitSha || '-') + '。请刷新列表并重新打开新路径文章继续编辑。';
            } catch (err) {
              statusEl.style.color = '#b91c1c';
              statusEl.textContent = '移动失败: ' + String((err && err.message) || err || 'unknown error');
            } finally {
              moveBtn.disabled = false;
            }
          });
        }

        function ensureInlineImageButton() {
          let wrap = document.getElementById('inline-image-button-wrap');
          if (!wrap) {
            wrap = document.createElement('span');
            wrap.id = 'inline-image-button-wrap';
            wrap.innerHTML =
              '<button id="inline-image-insert-btn" type="button">在线插入图片</button>' +
              '<input id="inline-image-file-input" type="file" accept="image/*" style="display:none" />' +
              '<span id="inline-image-status" aria-live="polite"></span>';
          }

          const anchor = findEditorToolbarAnchor();
          if (anchor && wrap.parentNode !== anchor) {
            anchor.appendChild(wrap);
          } else if (!anchor && !wrap.parentNode) {
            const textarea = findBodyTextarea();
            if (textarea && textarea.parentNode) textarea.parentNode.insertBefore(wrap, textarea);
          }
          return wrap;
        }

        function findEditorToolbarAnchor() {
          const controls = Array.from(document.querySelectorAll('button, [role="button"], [role="tab"]'));
          const modeControl = controls.find(function(control) {
            if (control.closest('[data-cms-editor-global-nav="hidden"]')) return false;
            const label = [
              control.textContent || '',
              control.getAttribute('aria-label') || '',
              control.getAttribute('title') || ''
            ].join(' ').trim().toLowerCase();
            return /markdown|rich\s*text|richtext|wysiwyg|visual|源码|富文本|所见即所得/.test(label);
          });
          if (modeControl) {
            return modeControl.closest('[role="tablist"]') || modeControl.parentElement || modeControl.parentNode;
          }

          const textarea = findBodyTextarea();
          if (!textarea) return null;
          let node = textarea.parentElement;
          for (let i = 0; node && i < 4; i += 1, node = node.parentElement) {
            const buttons = node.querySelectorAll('button, [role="button"], [role="tab"]');
            if (buttons.length) return buttons[0].parentElement || node;
          }
          return textarea.parentElement || textarea.parentNode;
        }

        function findBodyTextarea() {
          const textareas = Array.from(document.querySelectorAll('textarea'));
          if (!textareas.length) return null;

          const strongMatch = textareas.find(function (el) {
            const label = [
              el.getAttribute('name') || '',
              el.getAttribute('id') || '',
              el.getAttribute('aria-label') || '',
              el.getAttribute('placeholder') || '',
              el.getAttribute('data-testid') || ''
            ].join(' ').toLowerCase();
            return /(^|[\s_-])(body|content|markdown)([\s_-]|$)|正文/.test(label);
          });
          if (strongMatch) return strongMatch;

          return textareas
            .slice()
            .sort(function (a, b) {
              return String(b.value || '').length - String(a.value || '').length;
            })[0] || null;
        }

        function appendImageMarkdownToBody(markdown) {
          const textarea = findBodyTextarea();
          if (!textarea) return false;

          const start = typeof textarea.selectionStart === 'number' ? textarea.selectionStart : textarea.value.length;
          const end = typeof textarea.selectionEnd === 'number' ? textarea.selectionEnd : textarea.value.length;
          const before = textarea.value.slice(0, start);
          const after = textarea.value.slice(end);
          const needsLeadingBreak = before.length > 0 && !/\n$/.test(before);
          const needsTrailingBreak = after.length > 0 && !/^\n/.test(after);
          const insertText = (needsLeadingBreak ? '\n' : '') + markdown + (needsTrailingBreak ? '\n' : '');

          textarea.focus();
          textarea.value = before + insertText + after;
          const nextCursor = before.length + insertText.length;
          textarea.selectionStart = nextCursor;
          textarea.selectionEnd = nextCursor;
          textarea.dispatchEvent(new Event('input', { bubbles: true }));
          textarea.dispatchEvent(new Event('change', { bubbles: true }));
          return true;
        }

        function buildImageMarkdown(filename, alt) {
          const safeName = String(filename || '').trim().replace(/[()\s]+/g, '-');
          const safeAlt = String(alt || '').trim().replace(/[\r\n]+/g, ' ');
          return '![' + safeAlt + '](./img/' + safeName + ')';
        }

        function sanitizeImageFilename(name) {
          const raw = String(name || 'image').trim().replace(/\\/g, '/').split('/').pop();
          const dot = raw.lastIndexOf('.');
          const base = (dot > 0 ? raw.slice(0, dot) : raw)
            .toLocaleLowerCase('zh-Hans-CN')
            .replace(/\s+/g, '-')
            .replace(/[^\w\u4e00-\u9fff-]+/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '') || 'image';
          const ext = (dot > 0 ? raw.slice(dot + 1) : 'png')
            .toLowerCase()
            .replace(/[^a-z0-9]/g, '') || 'png';
          return base.slice(0, 80) + '-' + Date.now().toString(36) + '.' + ext.slice(0, 12);
        }

        function getInputValueByHints(hints) {
          const controls = Array.from(document.querySelectorAll('input, textarea, select'));
          const found = controls.find(function(control) {
            const text = [
              control.getAttribute('name') || '',
              control.getAttribute('id') || '',
              control.getAttribute('aria-label') || '',
              control.getAttribute('placeholder') || '',
              control.getAttribute('data-testid') || '',
              control.closest('label') ? control.closest('label').textContent || '' : '',
              control.parentElement ? control.parentElement.textContent || '' : ''
            ].join(' ').toLowerCase();
            return hints.some(function(hint) { return text.indexOf(hint) >= 0; });
          });
          return found ? String(found.value || '').trim() : '';
        }

        function slugifyPostTitle(title) {
          return (String(title || 'untitled')
            .toLocaleLowerCase('zh-Hans-CN')
            .replace(/\s+/g, '-')
            .replace(/[\\/]+/g, '-')
            .replace(/[^\w\u4e00-\u9fff-]+/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '') || 'untitled').slice(0, 120);
        }

        function getCurrentPostDirForUpload() {
          const entryPath = getRouteEntryPath();
          const parts = getPathParts(entryPath);
          if (parts) return 'src/posts/' + parts.archive + '/' + parts.slug;

          const archive = sanitizeArchiveInput(getInputValueByHints(['archive', '归档', '目录']));
          const title = getInputValueByHints(['title', '标题']);
          const rawDate = getInputValueByHints(['date', '日期']);
          const date = (rawDate.match(/\d{4}-\d{2}-\d{2}/) || [new Date().toISOString().slice(0, 10)])[0];
          if (!archive || !title) return '';
          return 'src/posts/' + archive + '/' + date + '-' + slugifyPostTitle(title);
        }

        function fileToBase64(file) {
          return new Promise(function(resolve, reject) {
            const reader = new FileReader();
            reader.onload = function() {
              const result = String(reader.result || '');
              resolve(result.replace(/^data:[^,]*,/, ''));
            };
            reader.onerror = function() { reject(reader.error || new Error('读取图片失败')); };
            reader.readAsDataURL(file);
          });
        }

        async function uploadInlineImageFile(file, filename, postDir) {
          const cfg = await parseRepoAndBranch();
          const contentBase64 = await fileToBase64(file);
          const res = await fetch('/api/admin/upload-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              repo: cfg.repo,
              branch: cfg.branch,
              postDir: postDir,
              filename: filename,
              contentType: file.type || 'application/octet-stream',
              contentBase64: contentBase64
            })
          });
          let data = null;
          try {
            data = await res.json();
          } catch (_) {
            data = null;
          }
          if (!res.ok) {
            throw new Error(data && data.error ? data.error : ('HTTP ' + res.status));
          }
          return data || {};
        }

        function syncInlineImageInsertPanel() {
          const existing = document.getElementById('inline-image-button-wrap');
          if (!isPostsEditorRoute()) {
            if (existing) existing.style.display = 'none';
            return;
          }

          const wrap = ensureInlineImageButton();
          wrap.style.display = 'inline-flex';
          const fileInput = wrap.querySelector('#inline-image-file-input');
          const insertBtn = wrap.querySelector('#inline-image-insert-btn');
          const statusEl = wrap.querySelector('#inline-image-status');

          if (insertBtn.dataset.bound === '1') return;
          insertBtn.dataset.bound = '1';
          insertBtn.addEventListener('click', function() {
            fileInput.click();
          });
          fileInput.addEventListener('change', async function() {
            const file = fileInput.files && fileInput.files[0];
            fileInput.value = '';
            if (!file) return;
            if (!/^image\//i.test(file.type || '')) {
              statusEl.style.color = '#b91c1c';
              statusEl.textContent = '请选择图片文件。';
              return;
            }
            const postDir = getCurrentPostDirForUpload();
            if (!postDir) {
              statusEl.style.color = '#b91c1c';
              statusEl.textContent = '请先填写归档、日期和标题。';
              return;
            }
            const filename = sanitizeImageFilename(file.name);
            insertBtn.disabled = true;
            statusEl.style.color = '#475569';
            statusEl.textContent = '上传中...';
            try {
              const uploaded = await uploadInlineImageFile(file, filename, postDir);
              const markdown = buildImageMarkdown(uploaded.filename || filename, (file.name || '').replace(/\.[^.]+$/, ''));
              const ok = appendImageMarkdownToBody(markdown);
              if (!ok) throw new Error('未找到正文编辑框。');
              statusEl.style.color = '#065f46';
              statusEl.textContent = '已插入';
            } catch (err) {
              statusEl.style.color = '#b91c1c';
              statusEl.textContent = String((err && err.message) || err || '上传失败');
            } finally {
              insertBtn.disabled = false;
            }
          });
        }

        window.CMS.registerWidget('archive-combobox', ArchiveComboboxControl);
        window.CMS.registerPreviewStyle(scopedPreviewCss, { raw: true });
        window.CMS.registerPreviewStyle('https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css');
        window.CMS.registerPreviewTemplate('posts', PostPreview);

        window.CMS.init();

        function isPostsEditorRoute() {
          const hash = decodeURIComponent(String(window.location.hash || '')).toLowerCase();
          return /\/collections\/posts\/(?:new|entries\/)/.test(hash);
        }

        function syncEditorTabsVisibility() {
          try {
            const shouldHide = isPostsEditorRoute();
            document.body.classList.toggle('cms-editor-mode', shouldHide);
            const toolsHost = document.getElementById('cms-editor-tools-host');
            if (toolsHost && !shouldHide) toolsHost.style.display = 'none';
            syncArchiveMovePanel();
            syncInlineImageInsertPanel();
            enforceMarkdownOnlyBodyEditor();
            syncGlobalAdminNavVisibility(shouldHide);
          } catch (_) {
            // Keep CMS UI available if editor chrome sync fails.
          }
        }

        function syncGlobalAdminNavVisibility(shouldHide) {
          const previous = Array.from(document.querySelectorAll('[data-cms-editor-global-nav="hidden"]'));
          previous.forEach(function(node) {
            if (!shouldHide) {
              node.removeAttribute('data-cms-editor-global-nav');
              node.style.visibility = '';
              node.style.height = '';
              node.style.overflow = '';
              node.style.margin = '';
              node.style.padding = '';
              node.style.border = '';
            }
          });
          if (!shouldHide) return;

          const candidates = Array.from(document.querySelectorAll(
            '[role="tablist"], nav, header, [role="navigation"], [class*="Toolbar"], [class*="toolbar"]'
          ));
          candidates.forEach(function(candidate) {
            if (candidate.id === 'cms-editor-tools-host' || candidate.closest('#cms-editor-tools-host')) return;
            const controls = Array.from(candidate.querySelectorAll('a, button, [role="tab"], [role="button"]'));
            const labels = (controls.length ? controls : [candidate]).map(function(t) {
              return (t.textContent || '').trim().toLowerCase();
            }).filter(Boolean);
            const flatLabels = labels.join(' | ');
            const hasContents = labels.includes('contents') || labels.includes('内容') || /\bcontents\b/.test(flatLabels);
            const hasWorkflow = labels.includes('workflow') || labels.includes('工作流') || /\bworkflow\b/.test(flatLabels);
            const hasMedia = labels.includes('media') || labels.includes('媒体') || /\bmedia\b/.test(flatLabels);
            const isTarget = (hasContents && hasWorkflow) || (hasContents && hasMedia);
            if (!isTarget) return;

            candidate.setAttribute('data-cms-editor-global-nav', 'hidden');
            candidate.style.visibility = 'hidden';
            candidate.style.height = '0';
            candidate.style.overflow = 'hidden';
            candidate.style.margin = '0';
            candidate.style.padding = '0';
            candidate.style.border = '0';
          });
        }

        let editorSyncTimer = null;
        function scheduleEditorChromeSync() {
          if (editorSyncTimer !== null) window.clearTimeout(editorSyncTimer);
          editorSyncTimer = window.setTimeout(function() {
            editorSyncTimer = null;
            syncEditorTabsVisibility();
          }, 30);
        }

        function syncEditorChromeSoon() {
          syncEditorTabsVisibility();
          window.setTimeout(syncEditorTabsVisibility, 120);
          window.setTimeout(syncEditorTabsVisibility, 500);
          window.setTimeout(syncEditorTabsVisibility, 1200);
        }

        function enforceMarkdownOnlyBodyEditor() {
          if (!isPostsEditorRoute()) return;
          const controls = Array.from(document.querySelectorAll('button, [role="button"], [role="tab"]'));
          controls.forEach(function(control) {
            const label = [
              control.textContent || '',
              control.getAttribute('aria-label') || '',
              control.getAttribute('title') || ''
            ].join(' ').trim().toLowerCase();
            if (!label) return;

            const isRichText = /rich\s*text|richtext|wysiwyg|visual|富文本|所见即所得/.test(label);
            if (isRichText) {
              control.setAttribute('aria-hidden', 'true');
              control.setAttribute('tabindex', '-1');
              control.style.display = 'none';
              control.disabled = true;
              return;
            }

            const isMarkdownMode = /markdown|raw|source|源码/.test(label);
            const isSelected = control.getAttribute('aria-selected') === 'true' ||
              control.getAttribute('aria-pressed') === 'true' ||
              /\bactive\b/.test(String(control.className || ''));
            if (isMarkdownMode && !isSelected && typeof control.click === 'function') {
              try {
                control.click();
              } catch (_) {}
            }
          });
        }

        window.addEventListener('hashchange', syncEditorChromeSoon);
        syncEditorChromeSoon();
        const observer = new MutationObserver(scheduleEditorChromeSync);
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
