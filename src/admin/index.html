<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@4.0.0/dist/markdown-it-footnote.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-katex@2.0.3/dist/markdown-it-katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
    <script>
      (function () {
        const GITHUB_OWNER = "MrTang-Yuhan";
        const GITHUB_REPO = "my-webpage";
        const GITHUB_BRANCH = "main";
        const ARCHIVE_NAME_RE = /^[a-z0-9-\u4e00-\u9fff]+$/;
        const ARCHIVE_NAME_ERROR = "Archive 目录名称仅支持小写字母、数字、连字符和汉字，不允许使用空格和大写字母";
        const TITLE_DUP_ERROR = "标题已存在，请使用其他标题。";
        const TITLE_CACHE_TTL_MS = 30 * 1000;
        let titleCache = { ts: 0, items: [] };
        const pendingMoves = new Map();
        const md = window.markdownit({ html: true, breaks: false, linkify: true });
        if (window.markdownitFootnote) md.use(window.markdownitFootnote);
        if (window.markdownitKatex) md.use(window.markdownitKatex);

        async function fetchArchiveDirs() {
          const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/src/posts?ref=${encodeURIComponent(GITHUB_BRANCH)}`;
          const res = await fetch(url, { headers: { Accept: "application/vnd.github+json" } });
          if (!res.ok) throw new Error(`Load archives failed: ${res.status}`);
          const items = await res.json();
          return (Array.isArray(items) ? items : [])
            .filter((it) => it && it.type === "dir" && it.name)
            .map((it) => String(it.name).trim())
            .filter(Boolean);
        }

        function applyArchiveOptions(runtimeConfig, dirs) {
          if (!runtimeConfig || !Array.isArray(runtimeConfig.collections)) return;
          const posts = runtimeConfig.collections.find((c) => c && c.name === "posts");
          if (!posts || !Array.isArray(posts.fields)) return;
          const archiveField = posts.fields.find((f) => f && f.name === "archive");
          if (!archiveField) return;

          const existingLabelByValue = {};
          (archiveField.options || []).forEach((opt) => {
            if (typeof opt === "string") {
              existingLabelByValue[opt] = opt;
              return;
            }
            if (opt && opt.value) existingLabelByValue[String(opt.value)] = opt.label || String(opt.value);
          });

          const uniqueDirs = Array.from(new Set(dirs)).sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
          archiveField.options = uniqueDirs.map((name) => ({
            label: existingLabelByValue[name] || name,
            value: name
          }));
        }

        async function loadRuntimeConfig() {
          const res = await fetch("/admin/config.yml?ts=" + Date.now(), { cache: "no-store" });
          if (!res.ok) throw new Error(`Load config failed: ${res.status}`);
          const configText = await res.text();
          const config = window.jsyaml.load(configText);
          if (!config || typeof config !== "object") throw new Error("Invalid config.yml");

          try {
            const dirs = await fetchArchiveDirs();
            if (dirs.length > 0) applyArchiveOptions(config, dirs);
          } catch (e) {
            console.warn("[admin] archive directory fetch failed, keep static options", e);
          }

          return config;
        }

        async function initCms() {
          if (!window.CMS || typeof window.initCMS !== "function") return;
          window.CMS.registerPreviewStyle("/css/style.css");
          window.CMS.registerPreviewStyle("https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css");

          try {
            const runtimeConfig = await loadRuntimeConfig();
            runtimeConfig.load_config_file = false;
            window.initCMS({ config: runtimeConfig });
          } catch (e) {
            console.error("[admin] runtime init failed", e);
            window.alert("CMS 初始化失败：" + (e && e.message ? e.message : String(e)));
          }
        }

        async function readCmsToken() {
          try {
            if (window.CMS && typeof window.CMS.getBackend === "function") {
              const backend = window.CMS.getBackend();
              if (backend && backend.authStore && typeof backend.authStore.retrieve === "function") {
                const user = await backend.authStore.retrieve();
                if (user && (user.token || user.access_token || user.jwt)) {
                  return user.token || user.access_token || user.jwt;
                }
              }
            }
          } catch {
            // ignore and fallback
          }

          const keys = ["netlify-cms-user", "decap-cms-user", "cms-user"];
          for (const store of [localStorage, sessionStorage]) {
            for (const key of keys) {
              try {
                const raw = store.getItem(key);
                if (!raw) continue;
                const parsed = JSON.parse(raw);
                const token = parsed && (parsed.token || parsed.access_token || parsed.jwt);
                if (token) return token;
              } catch {
                // ignore
              }
            }
          }
          return null;
        }

        function validateArchiveName(name) {
          return ARCHIVE_NAME_RE.test(String(name || "").trim());
        }

        function normalizeTitleKey(title) {
          return String(title || "").trim().toLocaleLowerCase("zh-Hans-CN");
        }

        function extractArchiveFromPath(filePath) {
          const path = String(filePath || "").replace(/\\/g, "/");
          const m = path.match(/^src\/posts\/([^/]+)\//);
          return m ? m[1] : "";
        }

        function extractSlugFolderFromPath(filePath) {
          const path = String(filePath || "").replace(/\\/g, "/");
          const m = path.match(/^src\/posts\/[^/]+\/([^/]+)\/index\.md$/);
          return m ? m[1] : "";
        }

        function parseTitleFromMarkdown(text) {
          const src = String(text || "");
          const m = src.match(/(?:^|\n)title:\s*(.+)\s*(?:\n|$)/i);
          if (!m) return "";
          let raw = m[1].trim();
          if ((raw.startsWith('"') && raw.endsWith('"')) || (raw.startsWith("'") && raw.endsWith("'"))) {
            raw = raw.slice(1, -1);
          }
          return raw.trim();
        }

        async function githubGetJson(url, token) {
          const headers = { Accept: "application/vnd.github+json" };
          if (token) headers.Authorization = "token " + token;
          const res = await fetch(url, { headers });
          if (!res.ok) throw new Error(`GitHub API failed: ${res.status}`);
          return res.json();
        }

        async function githubGetTextFile(path, token) {
          const apiPath = encodeURIComponent(path).replace(/%2F/g, "/");
          const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${apiPath}?ref=${encodeURIComponent(GITHUB_BRANCH)}`;
          const data = await githubGetJson(url, token);
          const content = (data && data.content) ? String(data.content).replace(/\n/g, "") : "";
          return content ? atob(content) : "";
        }

        async function githubListPostFiles(token) {
          const treeUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${encodeURIComponent(GITHUB_BRANCH)}?recursive=1`;
          const data = await githubGetJson(treeUrl, token);
          const tree = Array.isArray(data && data.tree) ? data.tree : [];
          return tree
            .map((n) => n && n.path)
            .filter((p) => typeof p === "string" && /^src\/posts\/.+\/index\.md$/.test(p));
        }

        async function loadAllPostTitles(token, forceRefresh) {
          const now = Date.now();
          if (!forceRefresh && now - titleCache.ts < TITLE_CACHE_TTL_MS && Array.isArray(titleCache.items) && titleCache.items.length > 0) {
            return titleCache.items;
          }

          const files = await githubListPostFiles(token);
          const items = [];
          for (const p of files) {
            try {
              const text = await githubGetTextFile(p, token);
              const title = parseTitleFromMarkdown(text);
              if (!title) continue;
              items.push({ path: p, key: normalizeTitleKey(title), title: title });
            } catch {
              // skip bad files
            }
          }
          titleCache = { ts: now, items };
          return items;
        }

        async function ensureTitleUnique(entry, token) {
          const title = entry.getIn(["data", "title"]) || "";
          const targetKey = normalizeTitleKey(title);
          if (!targetKey) return;
          const currentPath = String(entry.get("path") || "").replace(/\\/g, "/");
          const allTitles = await loadAllPostTitles(token, true);
          const conflict = allTitles.find((it) => it.key === targetKey && it.path !== currentPath);
          if (conflict) {
            throw new Error(TITLE_DUP_ERROR);
          }
        }

        function buildPostTargetPath(oldPath, newArchive) {
          const slugFolder = extractSlugFolderFromPath(oldPath);
          if (!slugFolder) return "";
          return `src/posts/${newArchive}/${slugFolder}/index.md`;
        }

        async function moveRepoFile(oldPath, newPath, token) {
          if (!oldPath || !newPath || oldPath === newPath) return;
          const oldApiPath = encodeURIComponent(oldPath).replace(/%2F/g, "/");
          const oldUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${oldApiPath}?ref=${encodeURIComponent(GITHUB_BRANCH)}`;
          const oldRes = await fetch(oldUrl, {
            headers: {
              Authorization: "token " + token,
              Accept: "application/vnd.github+json"
            }
          });
          if (!oldRes.ok) throw new Error(`Read source file failed: ${oldRes.status}`);
          const oldData = await oldRes.json();
          const content = String(oldData.content || "").replace(/\n/g, "");
          const sourceSha = oldData.sha;

          const newApiPath = encodeURIComponent(newPath).replace(/%2F/g, "/");
          const newUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${newApiPath}`;
          const probe = await fetch(`${newUrl}?ref=${encodeURIComponent(GITHUB_BRANCH)}`, {
            headers: {
              Authorization: "token " + token,
              Accept: "application/vnd.github+json"
            }
          });
          if (probe.status === 200) {
            throw new Error(`目标路径已存在：${newPath}`);
          }
          if (probe.status !== 404) {
            throw new Error(`检查目标路径失败：${probe.status}`);
          }

          const createRes = await fetch(newUrl, {
            method: "PUT",
            headers: {
              Authorization: "token " + token,
              Accept: "application/vnd.github+json",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              message: `chore: move post to ${newPath}`,
              content: content,
              branch: GITHUB_BRANCH
            })
          });
          if (!createRes.ok) {
            const txt = await createRes.text();
            throw new Error(`创建目标文件失败：${createRes.status} ${txt}`);
          }

          const oldDeleteUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${oldApiPath}`;
          const deleteRes = await fetch(oldDeleteUrl, {
            method: "DELETE",
            headers: {
              Authorization: "token " + token,
              Accept: "application/vnd.github+json",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              message: `chore: delete old post path ${oldPath}`,
              sha: sourceSha,
              branch: GITHUB_BRANCH
            })
          });
          if (!deleteRes.ok) {
            const txt = await deleteRes.text();
            throw new Error(`删除旧文件失败：${deleteRes.status} ${txt}`);
          }
        }

        async function createArchiveDir(name) {
          const token = await readCmsToken();
          if (!token) throw new Error("Not logged in");
          const normalized = String(name || "").trim().replace(/\\/g, "/").replace(/^\/+|\/+$/g, "");
          if (!normalized) throw new Error("Archive name is empty");
          if (!validateArchiveName(normalized)) throw new Error(ARCHIVE_NAME_ERROR);

          const filePath = `src/posts/${normalized}/.keep`;
          const apiPath = encodeURIComponent(filePath).replace(/%2F/g, "/");
          const body = {
            message: `chore: create archive ${normalized}`,
            content: btoa("archive placeholder"),
            branch: GITHUB_BRANCH
          };
          const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${apiPath}`, {
            method: "PUT",
            headers: {
              Authorization: "token " + token,
              Accept: "application/vnd.github+json",
              "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
          });
          if (res.status === 422) return;
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(`Create archive failed: ${res.status} ${txt}`);
          }
        }

        function injectNewArchiveButton() {
          if (document.getElementById("newArchiveBtn")) return;
          const newPostBtn = Array.from(document.querySelectorAll("button,a")).find((el) =>
            /new posts?/i.test((el.textContent || "").trim())
          );
          if (!newPostBtn || !newPostBtn.parentElement) return;

          const btn = document.createElement("button");
          btn.id = "newArchiveBtn";
          btn.type = "button";
          btn.textContent = "New Archive";
          btn.style.marginLeft = "10px";
          btn.style.padding = "10px 14px";
          btn.style.borderRadius = "10px";
          btn.style.border = "1px solid #3b4a52";
          btn.style.background = "#ffffff";
          btn.style.color = "#2a3640";
          btn.style.cursor = "pointer";
          btn.onclick = async function () {
            const name = window.prompt("New archive directory name (under src/posts):");
            if (!name) return;
            try {
              const token = await readCmsToken();
              if (!token) throw new Error("Not logged in");
              await createArchiveDir(name);
              window.location.reload();
            } catch (e) {
              window.alert(e.message || String(e));
            }
          };
          newPostBtn.parentElement.appendChild(btn);
        }

        function normalizeFootnotes(root) {
          const sections = root.querySelectorAll("section.footnotes");
          sections.forEach(function (section) {
            const listItems = section.querySelectorAll("li[id^='fn']");
            listItems.forEach(function (li) {
              const id = li.id.replace(/^fn/, "");
              const aside = document.createElement("aside");
              aside.id = "fn" + id;
              aside.className = "footnote";
              const clone = li.cloneNode(true);
              clone.querySelectorAll("a.footnote-backref").forEach(function (a) {
                a.remove();
              });
              aside.innerHTML = clone.innerHTML.trim();
              section.parentNode.insertBefore(aside, section);
            });
            section.remove();
          });
        }

        function renumberFootnotes(root) {
          const refs = Array.from(root.querySelectorAll("sup.footnote-ref a[href^='#fn']"));
          const order = [];
          const seen = new Set();
          refs.forEach(function (a) {
            const id = (a.getAttribute("href") || "").replace(/^#fn/, "");
            if (id && !seen.has(id)) {
              seen.add(id);
              order.push(id);
            }
          });
          const mapping = {};
          order.forEach(function (id, i) {
            mapping[id] = String(i + 1);
          });

          refs.forEach(function (a) {
            const oldId = (a.getAttribute("href") || "").replace(/^#fn/, "");
            const newId = mapping[oldId];
            if (!newId) return;
            a.setAttribute("href", "#fn" + newId);
            a.textContent = "[" + newId + "]";
          });

          root.querySelectorAll("aside.footnote[id^='fn']").forEach(function (aside) {
            const oldId = aside.id.replace(/^fn/, "");
            const newId = mapping[oldId];
            if (!newId) return;
            aside.id = "fn" + newId;
          });
        }

        function computeEntryPath(entry, collection) {
          const direct = entry.get("path");
          if (direct) return String(direct);

          const folder = collection && collection.get ? collection.get("folder") : null;
          const slug = entry.get("slug");
          if (folder && slug) {
            return String(folder).replace(/\/$/, "") + "/" + String(slug).replace(/^\//, "") + ".md";
          }
          return "";
        }

        function expandVideoShortcodeInDom(root) {
          if (!root) return;
          const nodes = root.querySelectorAll("p");
          nodes.forEach(function (p) {
            const text = (p.textContent || "").trim();
            const m = text.match(/^::video\{([^}]*)\}$/);
            if (!m) return;
            const attrs = m[1];
            const src = (attrs.match(/src="([^"]+)"/) || [])[1];
            if (!src) return;
            const poster = (attrs.match(/poster="([^"]+)"/) || [])[1];
            const caption = (attrs.match(/caption="([^"]+)"/) || [])[1];

            const wrapper = document.createElement("div");
            const video = document.createElement("video");
            video.setAttribute("controls", "");
            video.style.maxWidth = "100%";
            video.style.height = "auto";
            if (poster) video.setAttribute("poster", poster);
            const source = document.createElement("source");
            source.setAttribute("src", src);
            source.setAttribute("type", "video/mp4");
            video.appendChild(source);
            wrapper.appendChild(video);

            if (caption) {
              const cp = document.createElement("p");
              const em = document.createElement("em");
              em.textContent = caption;
              cp.appendChild(em);
              wrapper.appendChild(cp);
            }
            p.parentNode.replaceChild(wrapper, p);
          });
        }

        function rewriteRelativeUrlsInDom(root, entryPath) {
          if (!root || !entryPath) return;
          const normalizedPath = String(entryPath).replace(/\\/g, "/");
          const baseDir = normalizedPath.replace(/^src\//, "/").replace(/\/[^/]*$/, "/");

          root.querySelectorAll("img[src], a[href]").forEach(function (el) {
            const attr = el.tagName.toLowerCase() === "img" ? "src" : "href";
            const value = el.getAttribute(attr);
            if (!value) return;
            if (/^(?:[a-z]+:|\/|#|data:|blob:)/i.test(value)) return;
            const abs = new URL(value, window.location.origin + baseDir).pathname;
            el.setAttribute(attr, abs);
          });
        }

        function rewriteRelativeUrls(html, entryPath) {
          if (!entryPath) return html;
          const normalizedPath = String(entryPath).replace(/\\/g, "/");
          const baseDir = normalizedPath.replace(/^src\//, "/").replace(/\/[^/]*$/, "/");
          return html.replace(/\b(src|href)=["']([^"']+)["']/gi, function (match, attr, value) {
            if (/^(?:[a-z]+:|\/|#|data:|blob:)/i.test(value)) return match;
            const abs = new URL(value, window.location.origin + baseDir).pathname;
            return `${attr}="${abs}"`;
          });
        }

        function renderMathInMarkdown(markdown) {
          if (!window.katex || !markdown) return markdown;
          let text = String(markdown);
          text = text.replace(/\$\$([\s\S]+?)\$\$/g, function (_, expr) {
            try {
              return "\n" + window.katex.renderToString(expr.trim(), {
                displayMode: true,
                throwOnError: false
              }) + "\n";
            } catch {
              return _;
            }
          });
          text = text.replace(/(^|[^\$\\])\$([^\n$]+?)\$/g, function (_, prefix, expr) {
            try {
              return prefix + window.katex.renderToString(expr.trim(), {
                displayMode: false,
                throwOnError: false
              });
            } catch {
              return _;
            }
          });
          return text;
        }

        const PostPreview = window.createClass({
          componentDidMount: function () {
            this.postProcess();
          },
          componentDidUpdate: function () {
            this.postProcess();
          },
          postProcess: function () {
            if (!this._root) return;
            const bodyText = this.props.entry.getIn(["data", "body"]) || "";
            const titleText = this.props.entry.getIn(["data", "title"]) || "";
            const signature = String(titleText) + "\n---\n" + String(bodyText);
            if (this._lastProcessedSignature === signature) return;

            const entryPath = computeEntryPath(this.props.entry, this.props.collection);
            rewriteRelativeUrlsInDom(this._root, entryPath);
            expandVideoShortcodeInDom(this._root);
            normalizeFootnotes(this._root);
            renumberFootnotes(this._root);
            this._lastProcessedSignature = signature;
          },
          render: function () {
            const entry = this.props.entry;
            const title = entry.getIn(["data", "title"]) || "";
            const bodyMarkdown = entry.getIn(["data", "body"]) || "";
            const bodyWithMath = renderMathInMarkdown(bodyMarkdown);
            const entryPath = computeEntryPath(entry, this.props.collection);
            const bodyHtml = rewriteRelativeUrls(md.render(bodyWithMath), entryPath);

            return window.h(
              "article",
              { className: "post" },
              window.h(
                "div",
                { className: "post-content", ref: (el) => { this._root = el; } },
                window.h("h1", { className: "post-title" }, title),
                window.h("div", { className: "post-body-preview", dangerouslySetInnerHTML: { __html: bodyHtml } })
              )
            );
          }
        });

        if (window.CMS) {
          window.CMS.registerEventListener({
            name: "preSave",
            handler: async function ({ entry, collection }) {
              if (!collection || collection.get("name") !== "posts") return entry.get("data");
              const token = await readCmsToken();
              if (!token) throw new Error("Not logged in");

              const archive = String(entry.getIn(["data", "archive"]) || "").trim();
              if (!validateArchiveName(archive)) {
                throw new Error(ARCHIVE_NAME_ERROR);
              }

              await ensureTitleUnique(entry, token);

              const currentPath = String(entry.get("path") || "").replace(/\\/g, "/");
              const currentArchive = extractArchiveFromPath(currentPath);
              const isEdit = Boolean(currentPath);
              if (isEdit && currentArchive && archive && currentArchive !== archive) {
                const targetPath = buildPostTargetPath(currentPath, archive);
                if (!targetPath) {
                  throw new Error("Archive 变更失败：无法确定目标路径。");
                }
                pendingMoves.set(currentPath, { oldPath: currentPath, newPath: targetPath });
              }

              return entry.get("data");
            }
          });

          window.CMS.registerEventListener({
            name: "postSave",
            handler: async function ({ entry, collection }) {
              if (!collection || collection.get("name") !== "posts") return;
              const token = await readCmsToken();
              if (!token) return;
              const currentPath = String(entry.get("path") || "").replace(/\\/g, "/");
              let pending = pendingMoves.get(currentPath);
              if (!pending) {
                pending = Array.from(pendingMoves.values()).find((it) => it.oldPath === currentPath);
              }
              if (!pending) return;
              try {
                await moveRepoFile(pending.oldPath, pending.newPath, token);
                pendingMoves.delete(pending.oldPath);
                window.alert("Archive 已变更，Post 文件已同步移动。请刷新后继续编辑。");
              } catch (e) {
                pendingMoves.delete(pending.oldPath);
                window.alert("Archive 已修改但文件移动失败：" + (e.message || String(e)));
              }
            }
          });

          window.CMS.registerEditorComponent({
            id: "video",
            label: "Video",
            fields: [
              { name: "src", label: "Video Path/URL", widget: "string" },
              { name: "poster", label: "Poster (optional)", widget: "string", required: false },
              { name: "caption", label: "Caption (optional)", widget: "string", required: false }
            ],
            pattern: /^<video controls(?: poster="([^"]*)")?>\s*<source src="([^"]+)" type="video\/mp4">\s*<\/video>(?:\s*<p><em>([^<]*)<\/em><\/p>)?/m,
            fromBlock: function (match) {
              return {
                poster: match[1] || "",
                src: match[2] || "",
                caption: match[3] || ""
              };
            },
            toBlock: function (data) {
              const poster = data.poster ? ` poster="${data.poster}"` : "";
              const caption = data.caption ? `\n<p><em>${data.caption}</em></p>` : "";
              return `<video controls${poster}>\n  <source src="${data.src}" type="video/mp4">\n</video>${caption}`;
            },
            toPreview: function (data) {
              const poster = data.poster ? ` poster="${data.poster}"` : "";
              const caption = data.caption ? `<p><em>${data.caption}</em></p>` : "";
              return `<video controls${poster} style="max-width:100%;height:auto;"><source src="${data.src}" type="video/mp4"></video>${caption}`;
            }
          });

          window.CMS.registerPreviewTemplate("posts", PostPreview);

          const obs = new MutationObserver(function () { injectNewArchiveButton(); });
          obs.observe(document.documentElement, { childList: true, subtree: true });
          injectNewArchiveButton();
        }
        if (!window.__cmsStarted) {
          window.__cmsStarted = true;
          initCms();
        }
      })();
    </script>
  </body>
</html>
