<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
  </head>
  <body>
    <a href="/" id="backHomeBtn" style="position:fixed;top:12px;left:12px;z-index:9999;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#111;text-decoration:none;font:14px/1.2 sans-serif;">Back Home</a>
    <div id="adminDenied" style="display:none;max-width:720px;margin:80px auto;padding:16px;border:1px solid #ddd;border-radius:8px;font:14px/1.6 sans-serif;">
      <h2 style="margin:0 0 8px 0;font-size:20px;">No Admin Permission</h2>
      <p style="margin:0 0 12px 0;">This account can log in for comments, but cannot access the admin editor.</p>
      <a href="/" style="display:inline-block;padding:8px 12px;border:1px solid #ddd;border-radius:8px;text-decoration:none;color:#111;">Return Home</a>
    </div>
    <div id="adminApp" style="display:none;"></div>
    <script src="https://unpkg.com/remark-gfm@^4.0.1/index.js"></script>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <script>
      (function () {
        const OWNER_LOGIN = "MrTang-Yuhan";
        const params = new URLSearchParams(window.location.search);
        const fromLogin = params.get("from") === "login";
        const adminDenied = document.getElementById("adminDenied");
        const adminApp = document.getElementById("adminApp");

        function readToken() {
          const raw = localStorage.getItem("netlify-cms-user");
          if (!raw) return null;
          try {
            const parsed = JSON.parse(raw);
            return (parsed && (parsed.token || parsed.access_token)) || null;
          } catch {
            return null;
          }
        }

        async function currentGithubLogin(token) {
          if (!token) return null;
          try {
            const res = await fetch("https://api.github.com/user", {
              headers: { Authorization: "token " + token }
            });
            if (!res.ok) return null;
            const user = await res.json();
            return user && user.login ? user.login : null;
          } catch {
            return null;
          }
        }

        async function guardAdminAccess() {
          const token = readToken();
          const login = await currentGithubLogin(token);
          const isOwner = login === OWNER_LOGIN;

          if (!isOwner) {
            adminDenied.style.display = "block";
            adminApp.style.display = "none";
            return false;
          }

          if (fromLogin) {
            window.location.replace("/");
            return false;
          }

          adminDenied.style.display = "none";
          adminApp.style.display = "block";
          return true;
        }

        if (window.CMS && window.remarkGfm) {
          window.CMS.registerRemarkPlugin(window.remarkGfm);
          window.CMS.registerPreviewStyle("/css/style.css");
          window.CMS.registerPreviewStyle("https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css");
        }

        function normalizeFootnotes(root) {
          const sections = root.querySelectorAll("section.footnotes");
          sections.forEach(function(section) {
            const listItems = section.querySelectorAll("li[id^='fn']");
            listItems.forEach(function(li) {
              const id = li.id.replace(/^fn/, "");
              const aside = document.createElement("aside");
              aside.id = "fn" + id;
              aside.className = "footnote";
              const clone = li.cloneNode(true);
              clone.querySelectorAll("a.footnote-backref").forEach(function(a) {
                a.remove();
              });
              aside.innerHTML = clone.innerHTML.trim();
              section.parentNode.insertBefore(aside, section);
            });
            section.remove();
          });
        }

        function renumberFootnotes(root) {
          const refs = Array.from(root.querySelectorAll("sup.footnote-ref a[href^='#fn']"));
          const order = [];
          const seen = new Set();
          refs.forEach(function(a) {
            const id = (a.getAttribute("href") || "").replace(/^#fn/, "");
            if (id && !seen.has(id)) {
              seen.add(id);
              order.push(id);
            }
          });
          const mapping = {};
          order.forEach(function(id, i) {
            mapping[id] = String(i + 1);
          });

          refs.forEach(function(a) {
            const oldId = (a.getAttribute("href") || "").replace(/^#fn/, "");
            const newId = mapping[oldId];
            if (!newId) return;
            a.setAttribute("href", "#fn" + newId);
            a.textContent = "[" + newId + "]";
          });

          root.querySelectorAll("aside.footnote[id^='fn']").forEach(function(aside) {
            const oldId = aside.id.replace(/^fn/, "");
            const newId = mapping[oldId];
            if (!newId) return;
            aside.id = "fn" + newId;
          });
        }

        function renderMath(root) {
          if (!root || typeof renderMathInElement !== "function") return;
          root.querySelectorAll("span.katex, span.katex-display").forEach(function(node) {
            const parent = node.parentNode;
            if (!parent) return;
            const original = parent.getAttribute("data-original-math");
            if (original) {
              parent.textContent = original;
            }
          });
          root.querySelectorAll(".math-inline, .math-display").forEach(function(node) {
            if (!node.getAttribute("data-original-math")) {
              node.setAttribute("data-original-math", node.textContent || "");
            }
          });
          renderMathInElement(root, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false }
            ],
            ignoredClasses: ["katex", "katex-display", "katex-mathml", "katex-html"],
            throwOnError: false
          });
        }

        function computeEntryPath(entry, collection) {
          const direct = entry.get("path");
          if (direct) return String(direct);

          const folder = collection && collection.get ? collection.get("folder") : null;
          const slug = entry.get("slug");
          if (folder && slug) {
            return String(folder).replace(/\/$/, "") + "/" + String(slug).replace(/^\//, "") + ".md";
          }

          return "";
        }

        function expandVideoShortcodeInDom(root) {
          if (!root) return;
          const nodes = root.querySelectorAll("p");
          nodes.forEach(function(p) {
            const text = (p.textContent || "").trim();
            const m = text.match(/^::video\{([^}]*)\}$/);
            if (!m) return;
            const attrs = m[1];
            const src = (attrs.match(/src="([^"]+)"/) || [])[1];
            if (!src) return;
            const poster = (attrs.match(/poster="([^"]+)"/) || [])[1];
            const caption = (attrs.match(/caption="([^"]+)"/) || [])[1];

            const wrapper = document.createElement("div");
            const video = document.createElement("video");
            video.setAttribute("controls", "");
            video.style.maxWidth = "100%";
            video.style.height = "auto";
            if (poster) video.setAttribute("poster", poster);
            const source = document.createElement("source");
            source.setAttribute("src", src);
            source.setAttribute("type", "video/mp4");
            video.appendChild(source);
            wrapper.appendChild(video);

            if (caption) {
              const cp = document.createElement("p");
              const em = document.createElement("em");
              em.textContent = caption;
              cp.appendChild(em);
              wrapper.appendChild(cp);
            }

            p.parentNode.replaceChild(wrapper, p);
          });
        }

        function rewriteRelativeUrlsInDom(root, entryPath) {
          if (!root || !entryPath) return;
          const normalizedPath = String(entryPath).replace(/\\/g, "/");
          const baseDir = normalizedPath
            .replace(/^src\//, "/")
            .replace(/\/[^/]*$/, "/");

          root.querySelectorAll("img[src], a[href]").forEach(function(el) {
            const attr = el.tagName.toLowerCase() === "img" ? "src" : "href";
            const value = el.getAttribute(attr);
            if (!value) return;
            if (/^(?:[a-z]+:|\/|#|data:|blob:)/i.test(value)) return;
            const abs = new URL(value, window.location.origin + baseDir).pathname;
            el.setAttribute(attr, abs);
          });
        }

        const PostPreview = window.createClass({
          componentDidMount: function() {
            this.postProcess();
          },
          componentDidUpdate: function() {
            this.postProcess();
          },
          postProcess: function() {
            if (!this._root) return;
            const bodyText = this.props.entry.getIn(["data", "body"]) || "";
            const titleText = this.props.entry.getIn(["data", "title"]) || "";
            const signature = String(titleText) + "\n---\n" + String(bodyText);
            if (this._lastProcessedSignature === signature) return;
            this._lastProcessedSignature = signature;

            const entryPath = computeEntryPath(this.props.entry, this.props.collection);
            rewriteRelativeUrlsInDom(this._root, entryPath);
            expandVideoShortcodeInDom(this._root);
            normalizeFootnotes(this._root);
            renumberFootnotes(this._root);
            renderMath(this._root);
          },
          render: function() {
            const entry = this.props.entry;
            const title = entry.getIn(["data", "title"]) || "";
            const body = this.props.widgetFor("body");

            return window.h(
              "article",
              { className: "post" },
              window.h(
                "div",
                { className: "post-content", ref: (el) => { this._root = el; } },
                window.h("h1", { className: "post-title" }, title),
                window.h("div", { className: "post-body-preview" }, body)
              )
            );
          }
        });

        if (window.CMS) {
          if (typeof window.CMS.init === "function") {
            window.CMS.init({
              config: { load_config_file: true },
              mountElement: document.getElementById("adminApp")
            });
          }

          window.CMS.registerEditorComponent({
            id: "video",
            label: "Video",
            fields: [
              { name: "src", label: "Video Path/URL", widget: "string" },
              { name: "poster", label: "Poster (optional)", widget: "string", required: false },
              { name: "caption", label: "Caption (optional)", widget: "string", required: false }
            ],
            pattern: /^<video controls(?: poster="([^"]*)")?>\s*<source src="([^"]+)" type="video\/mp4">\s*<\/video>(?:\s*<p><em>([^<]*)<\/em><\/p>)?/m,
            fromBlock: function(match) {
              return {
                poster: match[1] || "",
                src: match[2] || "",
                caption: match[3] || ""
              };
            },
            toBlock: function(data) {
              const poster = data.poster ? ` poster="${data.poster}"` : "";
              const caption = data.caption ? `\n<p><em>${data.caption}</em></p>` : "";
              return `<video controls${poster}>\n  <source src="${data.src}" type="video/mp4">\n</video>${caption}`;
            },
            toPreview: function(data) {
              const poster = data.poster ? ` poster="${data.poster}"` : "";
              const caption = data.caption ? `<p><em>${data.caption}</em></p>` : "";
              return `<video controls${poster} style="max-width:100%;height:auto;"><source src="${data.src}" type="video/mp4"></video>${caption}`;
            }
          });

          window.CMS.registerPreviewTemplate("posts", PostPreview);
        }

        guardAdminAccess();
      })();
    </script>
  </body>
</html>
