backend:
  name: github
  repo: MrTang-Yuhan/my-webpage
  branch: main
  base_url: https://my-webpage-adu.pages.dev
  auth_endpoint: /api/auth

media_folder: src/images/uploads
public_folder: /images/uploads

publish_mode: editorial_workflow

collections:
  - name: posts
    label: 文章
    folder: src/posts
    path: "{{archive}}/{{slug}}/index"
    media_folder: img
    public_folder: ./img
    create: true
    extension: md
    format: frontmatter
    nested:
      depth: 10
      summary: "{{title}}"
      subfolders: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: Layout
        name: layout
        widget: hidden
        default: post.njk
      - label: 专栏目录
        name: archive
        widget: select
        required: true
        hint: 文章会创建在 src/posts/<专栏目录>/<slug>/index.md
        options:
          - label: mode-parallelism
            value: mode-parallelism
          - label: 备忘录
            value: 备忘录
          - label: interconnect
            value: interconnect
          - label: triosim模拟器
            value: triosim模拟器
          - label: 大模型显存和flops分析
            value: 大模型显存和flops分析
      - label: 标题
        name: title
        widget: string
        hint: 建议唯一，避免归档页与搜索混淆。
      - label: 日期
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
      - label: 摘要
        name: description
        widget: text
        required: false
        hint: 用于首页/搜索摘要展示；可留空。
      - label: 标签
        name: tags
        widget: list
        default:
          - post
      - label: 正文
        name: body
        widget: markdown
        hint: 支持 Markdown、表格、代码块、脚注与 KaTeX 数学公式。
