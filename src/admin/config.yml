backend:
  name: github
  repo: MrTang-Yuhan/my-webpage
  branch: main
  base_url: https://my-webpage-adu.pages.dev
  auth_endpoint: /api/auth

media_folder: src/images/uploads
public_folder: /images/uploads

publish_mode: editorial_workflow

collections:
  - name: posts
    label: 文章
    folder: src/posts
    path: "{{archive}}/{{slug}}/index"
    media_folder: img
    public_folder: ./img
    create: true
    extension: md
    format: frontmatter
    identifier_field: post_id
    summary: "{{title}}"
    nested:
      depth: 10
      summary: "{{title}}"
      subfolders: true
    slug: "{{slug}}"
    fields:
      - label: Layout
        name: layout
        widget: hidden
        default: post.njk
      - label: 固定路径 ID
        name: post_id
        widget: hidden
        required: true
      - label: 归档目录
        name: archive
        widget: archive-combobox
        required: true
        options:
          - model-parallelism
          - interconnect
          - 备忘录
          - triosim模拟器
          - 大模型显存和flops分析
        hint: 可下拉选择已有目录，也可直接输入新目录；文章将写入 src/posts/<archive>/<slug>/index.md。
      - label: 标题
        name: title
        widget: string
        hint: 建议唯一，避免归档页与搜索混淆。
      - label: 日期
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
      - label: 摘要
        name: description
        widget: text
        required: false
        hint: 用于首页和搜索摘要，可留空。
      - label: 标签
        name: tags
        widget: list
        default:
          - post
      - label: 正文
        name: body
        widget: markdown
        modes:
          - raw
        hint: Markdown 源码是权威格式；Rich Text 已禁用，避免自动改写源码格式。
      - label: 附件上传入口
        name: attachment_upload
        widget: file
        required: false
        media_folder: attach
        public_folder: ./attach
        choose_url: false
        hint: 用于工具栏“上传附件”按钮；文件会上传到当前文章 attach/ 目录。
