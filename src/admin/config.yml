backend:
  name: github
  repo: MrTang-Yuhan/my-webpage
  branch: main
  base_url: https://my-webpage-adu.pages.dev
  auth_endpoint: /api/auth

media_folder: src/images/uploads
public_folder: /images/uploads

publish_mode: editorial_workflow

collections:
  - name: posts
    label: 文章
    folder: src/posts
    path: "{{archive}}/{{slug}}/index"
    media_folder: img
    public_folder: ./img
    create: true
    extension: md
    format: frontmatter
    nested:
      depth: 10
      summary: "{{title}}"
      subfolders: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: Layout
        name: layout
        widget: hidden
        default: post.njk
      - label: 归档目录
        name: archive
        widget: string
        required: true
        hint: 可直接输入新目录名（示例：mode-parallelism、interconnect、备忘录）。建议使用小写英文/数字/连字符或中文；文章将写入 src/posts/<归档目录>/<slug>/index.md。
      - label: 标题
        name: title
        widget: string
        hint: 建议唯一，避免归档页与搜索混淆。
      - label: 日期
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
      - label: 摘要
        name: description
        widget: text
        required: false
        hint: 用于首页和搜索摘要，可留空。
      - label: 标签
        name: tags
        widget: list
        default:
          - post
      - label: 正文
        name: body
        widget: markdown
        hint: 支持 Markdown 与内联/块级 HTML、脚注、表格、代码块、KaTeX 公式。
